name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-x64,     os: ubuntu-latest }
          - { target: linux-arm64,   os: ubuntu-24.04-arm }
          - { target: macos-x64,     os: macos-15-intel }
          - { target: macos-arm64,   os: macos-14 }
          - { target: windows-x64,   os: windows-latest }
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: '25'
          cache: maven

      # Linux build deps:
      #  - xvfb + GTK/GL libs: the -Pdist build trains a full-GUI AOT cache (scripts/aot_build.java),
      #    and on a headless runner JavaFX needs a virtual X display; the helper auto-wraps training in
      #    xvfb-run when DISPLAY is unset. Best-effort — training degrades gracefully if it's missing.
      #  - rpm: provides rpmbuild so jpackage can build the .rpm (the Linux leg ships .deb AND .rpm).
      - name: Install Linux build deps (virtual display + rpmbuild)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb libgtk-3-0 libgl1 libxxf86vm1 rpm

      - name: Build native installer (-Pdist)
        shell: bash
        # `clean` is REQUIRED, not just tidiness: an incremental compile does not regenerate a synthetic
        # `$SwitchMap` inner class (e.g. KeyDispatcher$1 for an enum `switch`) that a prior/parallel build
        # or an IDE compiler left deleted in target/classes — javac sees the .java as up-to-date and skips
        # it. jlink then ships a jimage missing that class and the packaged app throws ClassNotFoundException
        # on the first keypress. A clean target/ guarantees every class is regenerated.
        env:
          # Names this leg in the AOT step's job-summary row and, if the cache is missing, in its error
          # annotation — so "which target shipped uncached?" is answerable from the run page.
          EDITORA_TARGET: ${{ matrix.target }}
          # Set to '1' to make a missing AOT cache FAIL the leg rather than only annotate it. Left off for
          # now: macOS arm64 shipped uncached from v0.9.1 through v0.9.8 (JavaFX 26's Metal pipeline
          # aborting on that runner's paravirtual GPU), and the fix cannot be verified anywhere except this
          # runner — arming the gate before a green tag would risk blocking a release over a perf-only
          # artifact. Once a release shows "AOT cache trained" for all five targets, flip this to '1' to
          # keep it that way.
          EDITORA_REQUIRE_AOT: '0'
        run: ./mvnw -B --no-transfer-progress clean -Pdist -DskipTests package

      # Portable single-file Linux build from the AOT-trained app-image (no sandbox — host tools work;
      # see scripts/build-appimage.sh). Best-effort: continue-on-error so a flaky appimagetool / FUSE /
      # network hiccup can't sink the .deb/.rpm/.jar release. Runs before staging so the .AppImage is
      # picked up from target/dist.
      # x64 only — on Linux ARM we ship just the tar.gz + jar (no .deb/.rpm/.AppImage).
      - name: Build AppImage (Linux)
        if: matrix.target == 'linux-x64'
        continue-on-error: true
        shell: bash
        run: scripts/build-appimage.sh target/aot-image/Editora branding/editora.png target/dist

      # Portable extract-and-install tarball from the same AOT-trained app-image (see
      # scripts/build-tarball.sh): a jlink runtime + native bin/Editora launcher + a bundled install.sh
      # that installs to /opt/editora (root) or ~/.local/editora (user) with an `editora` command + menu
      # entry. The extract-and-install counterpart to the .AppImage — no jpackage installer, no FUSE.
      # Best-effort: continue-on-error so it can't sink the .deb/.rpm/.AppImage/.jar release.
      - name: Build install tarball (Linux)
        if: runner.os == 'Linux'
        continue-on-error: true
        shell: bash
        run: scripts/build-tarball.sh target/aot-image/Editora target/dist

      # Runnable fat jar for this runner's platform (JavaFX natives are host-specific, so each
      # runner produces its own jar — a single all-platforms jar isn't possible, see pom.xml).
      # Skipped for macOS (both arches) — those targets ship only the .dmg.
      - name: Build fat jar (-Pfatjar)
        if: ${{ !startsWith(matrix.target, 'macos-') }}
        shell: bash
        run: ./mvnw -B --no-transfer-progress -Pfatjar -DskipTests package

      # Tag pushes use the tag (minus the leading v); manual runs fall back to the pom version.
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>(.+)<\/version>.*/\1/')"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # jpackage names DMG/MSI without a version/arch, so disambiguate per target before releasing.
      # (The fat jar already carries the version, e.g. Editora-<version>-<target>.jar.)
      - name: Stage artifacts
        shell: bash
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p staging
          for f in target/dist/*; do
            [ -f "$f" ] || continue
            # Preserve compound extensions (.tar.gz) so the artifact isn't named "...-linux-x64.gz".
            case "$f" in
              *.tar.gz) ext="tar.gz" ;;
              *)        ext="${f##*.}" ;;
            esac
            # Linux ARM ships only the tarball (+ jar) — drop the .deb/.rpm installers that -Pdist
            # produced (the .AppImage was skipped upstream).
            if [ "${{ matrix.target }}" = "linux-arm64" ]; then
              case "$ext" in
                deb|rpm|AppImage) continue ;;
              esac
            fi
            cp "$f" "staging/Editora-${VERSION}-${{ matrix.target }}.${ext}"
          done
          # The fat jar isn't built for macOS (see the -Pfatjar step's condition), so guard the copy.
          # The `|| true` is required: GitHub's `shell: bash` runs with `set -eo pipefail`, so a no-match
          # `ls` (macOS: no jar) would abort the whole step before the `-n` guard below could skip it.
          jar="$(ls target/Editora-*.jar 2>/dev/null | head -1 || true)"
          if [ -n "$jar" ]; then
            cp "$jar" "staging/$(basename "$jar" .jar)-${{ matrix.target }}.jar"
          fi

      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: Editora-${{ steps.ver.outputs.version }}-${{ matrix.target }}
          path: staging/*
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all installers
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>(.+)<\/version>.*/\1/')"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: JReleaser
        uses: jreleaser/release-action@v2
        with:
          # Real tag pushes publish; manual runs only validate (dry run).
          arguments: ${{ github.event_name == 'workflow_dispatch' && 'release --dry-run' || 'full-release' }}
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.ver.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-output
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
          if-no-files-found: ignore

  # Reopen master for development: after a real release, put the pom back on the NEXT patch with a
  # -SNAPSHOT suffix, so anything built off master until the next release identifies itself as a
  # development build (AppInfo.isSnapshot() -> the toolbar badge, About, --version).
  #
  # Deliberately skipped for pre-releases (vX.Y.Z-rcN): an rc is cut from the -SNAPSHOT line and must
  # not advance it. Also skipped on workflow_dispatch, which is only ever a dry run.
  bump:
    name: Reopen master for development
    needs: release
    if: github.event_name == 'push' && github.ref_type == 'tag' && !contains(github.ref_name, '-rc')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out master
        uses: actions/checkout@v6
        with:
          ref: master
          # Default GITHUB_TOKEN; if master is branch-protected, swap in a PAT with bypass rights.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump pom to the next -SNAPSHOT
        shell: bash
        run: |
          set -euo pipefail
          released="${GITHUB_REF_NAME#v}"
          current="$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>(.+)<\/version>.*/\1/')"

          # Idempotence guard: only advance when master still sits on the version we just released.
          # Anything else (already a -SNAPSHOT, or moved on) means a human got there first — leave it.
          if [ "$current" != "$released" ]; then
            echo "master pom is '$current', not the released '$released' — nothing to bump."
            exit 0
          fi

          # Next patch. A released version is always plain X.Y.Z here (the tag drives it).
          IFS='.' read -r major minor patch <<< "$released"
          next="${major}.${minor}.$((patch + 1))-SNAPSHOT"

          # Replace only the FIRST <version> — the project's own, before any dependency/plugin ones.
          sed -i -E "0,/<version>${released}<\/version>/s//<version>${next}<\/version>/" pom.xml
          grep -m1 '<version>' pom.xml

          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pom.xml
          git commit -m "chore: reopen master at ${next} after ${GITHUB_REF_NAME}"
          git push origin HEAD:master
