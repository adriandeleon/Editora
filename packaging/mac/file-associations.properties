# macOS file associations for the packaged Editora.app (jpackage --file-associations).
# This adds a CFBundleDocumentTypes entry to the app's Info.plist so Editora appears in Finder's
# "Open With" menu for common text/source files. LSHandlerRank=Alternate means Editora is offered
# as an alternate handler (it does not steal the default from TextEdit / your existing editor).
# The file is opened via the macOS "openFiles" Apple Event, which App.installMacOpenFilesHandler
# routes into the editor (Finder does not pass the path as a command-line argument on macOS).
extension=txt text md markdown mkd java py rb js mjs cjs jsx ts mts cts tsx json jsonc xml yaml yml toml ini cfg conf properties sh bash zsh c h hpp cpp cc cxx go rs php lua sql html htm css scss csv tsv tab log gradle groovy kt kts mmd http rest patch diff env
mime-type=text/plain
description=Text or source file
mac.CFBundleTypeRole=Editor
mac.LSHandlerRank=Alternate
